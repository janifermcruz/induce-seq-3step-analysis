site_name: INDUCE-seq® Analysis 3 Step Guide
site_description: >-
  Get from sequencing run to results in three easy steps.
  For use with the INDUCE-seq Analysis platform (Pipeline v2.0).
site_author: Broken String Biosciences

theme:
  name: material
  palette:
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: Roboto Mono
  favicon: assets/favicon.ico
  logo: assets/logo-light.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://www.brokenstringbio.com
    - icon: fontawesome/solid/envelope
      link: mailto:support@brokenstringbio.com

copyright: >-
  &copy; 2026 Broken String Biosciences &mdash;
  Pipeline v2.0 &middot; For Research Use Only

nav:
  - Home: index.md
  - Before You Begin: before-you-begin.md
  - 1. Process Your Data: process-data.md
  - 2. Run the Analysis: run-analysis.md
  - 3. Explore Your Results: explore-results.md
  - Need Help?: help.md
